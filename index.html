<style>
:root { --bg:#0a0a0a; --fg:#fafafa; --dim:#666; --accent:#fafafa; --lavender:238,217,255; }
* { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; background:var(--bg); color:var(--fg); font-family:'Inter',system-ui,sans-serif; overflow:hidden; -webkit-font-smoothing:antialiased; }
body { display:flex; flex-direction:column; align-items:center; justify-content:center; position:relative; }

#stage { width:100vw; height:100vh; display:flex; align-items:center; justify-content:center; position:relative; cursor:default; }
#canvas-wrap { position:relative; max-width:100vw; max-height:100vh; display:flex; align-items:center; justify-content:center; }
canvas { display:block; max-width:100vw; max-height:100vh; box-shadow:0 20px 80px rgba(0,0,0,0.5); background:transparent; }
canvas.pre-render { visibility:hidden; }
canvas.back { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); visibility:hidden; pointer-events:none; }

/* Loader */
#loader { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; background:var(--bg); z-index:50; transition:opacity .4s; font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--dim); letter-spacing:.08em; }
#loader.hide { opacity:0; pointer-events:none; }
#loader-label { display:flex; align-items:center; margin-bottom:14px; }
#loader-label::after { content:''; width:6px; height:6px; background:var(--dim); border-radius:50%; margin-left:10px; animation:pulse 1s infinite; }
#progress-track { width:180px; height:1px; background:rgba(255,255,255,0.08); position:relative; overflow:hidden; }
#progress-bar { position:absolute; top:0; left:0; height:100%; width:0%; background:rgba(238,217,255,0.7); transition:width .3s ease-out; }
#progress-pct { margin-top:10px; font-size:10px; color:rgba(238,217,255,0.5); font-variant-numeric:tabular-nums; }
@keyframes pulse { 0%,100%{opacity:.3} 50%{opacity:1} }

/* Click zones for nav (invisible) */
.nav-zone { position:absolute; top:0; height:100%; width:25%; z-index:10; cursor:pointer; }
.nav-zone.prev { left:0; }
.nav-zone.next { right:0; cursor:e-resize; }
.nav-zone.prev { cursor:w-resize; }

/* Chrome: appears on hover/motion */
#chrome { position:fixed; bottom:0; left:0; right:0; padding:20px 24px; display:flex; justify-content:space-between; align-items:center; background:linear-gradient(to top, rgba(0,0,0,0.6), transparent); z-index:20; opacity:0; transition:opacity .3s; pointer-events:none; font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:.08em; }
body.show-chrome #chrome { opacity:1; pointer-events:auto; }
#counter { color:var(--fg); }
#counter .dim { color:var(--dim); }
#meta { color:var(--dim); text-transform:uppercase; }
#meta a { color:var(--dim); text-decoration:none; border-bottom:1px solid transparent; transition:border-color .2s; }
#meta a:hover { border-bottom-color:var(--dim); }

#hint { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); font-family:'IBM Plex Mono',monospace; font-size:11px; color:rgba(var(--lavender),0.85); letter-spacing:.1em; pointer-events:none; opacity:0; transition:opacity .5s; z-index:30; text-align:center; background:rgba(10,10,10,0.78); padding:14px 20px; border:1px solid rgba(var(--lavender),0.22); backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px); box-shadow:0 8px 32px rgba(0,0,0,0.3); }
#hint.show { opacity:1; }
#hint kbd { background:rgba(var(--lavender),0.12); color:rgba(var(--lavender),0.95); padding:2px 6px; border-radius:3px; margin:0 2px; font-family:inherit; border:1px solid rgba(var(--lavender),0.2); }

@media (max-width: 768px) {
  #chrome { padding:14px 16px; font-size:10px; }
  #hint { display:none; }
}
</style>

<body>

<div id="stage">
  <div id="canvas-wrap"><canvas id="canvas" class="pre-render"></canvas><canvas id="canvas-back" class="back"></canvas></div>
  <div class="nav-zone prev" id="prevZone" aria-label="Previous"></div>
  <div class="nav-zone next" id="nextZone" aria-label="Next"></div>
</div>

<div id="loader">
  <div id="loader-label">LOADING</div>
  <div id="progress-track"><div id="progress-bar"></div></div>

</div>

  <kbd>←</kbd> <kbd>→</kbd> navigate &nbsp;·&nbsp; <kbd>F</kbd> fullscreen &nbsp;·&nbsp; <kbd>ESC</kbd> exit
</div>

<div id="chrome">
  <div id="counter"><span id="cur">1</span><span class="dim"> / </span><span id="total">–</span></div>
  <div id="meta">MIAN DENG &nbsp;·&nbsp; <a href="https://0xmian.com" target="_blank" rel="noopener">0XMIAN.COM</a></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

const PDF_URL = 'Mian_xAI_Pitch.pdf';
const loader = document.getElementById('loader');
const loaderLabel = document.getElementById('loader-label');
const progressBar = document.getElementById('progress-bar');
const progressPct = document.getElementById('progress-pct');
const curEl = document.getElementById('cur');
const totalEl = document.getElementById('total');
const hintEl = document.getElementById('hint');

let pdfDoc = null, currentPage = 1, totalPages = 0, rendering = false, pendingPage = null;

// Parse ?page= from URL for deep linking
const urlParams = new URLSearchParams(window.location.search);
const startPage = Math.max(1, parseInt(urlParams.get('page')) || 1);

function setProgress(pct) {
  pct = Math.max(0, Math.min(100, Math.round(pct)));
  progressBar.style.width = pct + '%';
  progressPct.textContent = pct + '%';
}

let frontCanvas = document.getElementById('canvas');
let backCanvas = document.getElementById('canvas-back');

async function render(num) {
  if (rendering) { pendingPage = num; return; }
  rendering = true;
  const page = await pdfDoc.getPage(num);
  const dpr = Math.min(window.devicePixelRatio || 1, 2); // cap at 2× for mobile perf
  const vw = window.innerWidth, vh = window.innerHeight;
  const unscaled = page.getViewport({ scale: 1 });
  const scale = Math.min(vw / unscaled.width, vh / unscaled.height) * 0.96;
  // Round CSS dimensions to whole pixels to eliminate sub-pixel white border
  const cssW = Math.round(unscaled.width * scale);
  const cssH = Math.round(unscaled.height * scale);
  const viewport = page.getViewport({ scale: (cssW * dpr) / unscaled.width });
  // Render to the OFF-screen back canvas
  backCanvas.width = cssW * dpr;
  backCanvas.height = cssH * dpr;
  backCanvas.style.width = cssW + 'px';
  backCanvas.style.height = cssH + 'px';
  const backCtx = backCanvas.getContext('2d');
  await page.render({ canvasContext: backCtx, viewport }).promise;
  // Swap: the back canvas becomes front, front becomes back
  frontCanvas.classList.add('back');
  backCanvas.classList.remove('back');
  backCanvas.classList.remove('pre-render');
  const tmp = frontCanvas;
  frontCanvas = backCanvas;
  backCanvas = tmp;
  rendering = false;
  curEl.textContent = num;
  const url = new URL(window.location);
  if (num === 1) url.searchParams.delete('page'); else url.searchParams.set('page', num);
  window.history.replaceState({}, '', url);
  if (pendingPage !== null) { const p = pendingPage; pendingPage = null; render(p); }
}

function go(n) {
  n = Math.max(1, Math.min(totalPages, n));
  if (n === currentPage) return;
  currentPage = n;
  render(n);
}

// Nav
document.getElementById('prevZone').addEventListener('click', () => go(currentPage - 1));
document.getElementById('nextZone').addEventListener('click', () => go(currentPage + 1));

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown' || e.key === ' ' || e.key === 'PageDown') { e.preventDefault(); go(currentPage + 1); }
  else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp' || e.key === 'PageUp') { e.preventDefault(); go(currentPage - 1); }
  else if (e.key === 'Home') { e.preventDefault(); go(1); }
  else if (e.key === 'End') { e.preventDefault(); go(totalPages); }
  else if (e.key === 'f' || e.key === 'F') { toggleFullscreen(); }
});

function toggleFullscreen() {
  if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(()=>{});
  else document.exitFullscreen();
}

// Touch swipe
let touchStartX = 0, touchStartY = 0;
document.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; touchStartY = e.touches[0].clientY; }, {passive:true});
document.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (Math.abs(dx) > 50 && Math.abs(dx) > Math.abs(dy)) { dx < 0 ? go(currentPage + 1) : go(currentPage - 1); }
}, {passive:true});

// Chrome show/hide on motion
let chromeTimer;
function showChrome() {
  document.body.classList.add('show-chrome');
  clearTimeout(chromeTimer);
  chromeTimer = setTimeout(() => document.body.classList.remove('show-chrome'), 2500);
}
document.addEventListener('mousemove', showChrome);
document.addEventListener('touchstart', showChrome, {passive:true});

// Resize
let resizeTimer;
window.addEventListener('resize', () => { clearTimeout(resizeTimer); resizeTimer = setTimeout(() => render(currentPage), 150); });

// Init
(async () => {
  try {
    const loadingTask = pdfjsLib.getDocument({
      url: PDF_URL,
      disableAutoFetch: true,   // don't download full file upfront
      disableStream: false,     // use streaming chunks
      rangeChunkSize: 65536     // 64KB chunks
    });
    // Progress callback: fires as bytes arrive
    loadingTask.onProgress = ({ loaded, total }) => {
      if (total) setProgress((loaded / total) * 100);
      else setProgress(Math.min(90, (loaded / (6.7 * 1024 * 1024)) * 100)); // estimate if total unknown
    };
    pdfDoc = await loadingTask.promise;
    totalPages = pdfDoc.numPages;
    totalEl.textContent = totalPages;
    currentPage = Math.min(startPage, totalPages);
    setProgress(100);
    await render(currentPage);
    loader.classList.add('hide');
    showChrome();
    // Show keyboard hint briefly on desktop when landing on page 1
    if (window.innerWidth > 768 && currentPage === 1) {
      setTimeout(() => { hintEl.classList.add('show'); setTimeout(() => hintEl.classList.remove('show'), 3500); }, 800);
    }
  } catch (err) {
    loaderLabel.textContent = 'FAILED TO LOAD · ' + err.message;
  }
})();
</script>
