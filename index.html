<style>
:root { --bg:#0a0a0a; --fg:#fafafa; --dim:#666; --accent:#fafafa; --lavender:238,217,255; }
* { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; min-height:100dvh; background:var(--bg); color:var(--fg); font-family:'Inter',system-ui,sans-serif; overflow:hidden; -webkit-font-smoothing:antialiased; }
body { display:flex; flex-direction:column; align-items:center; justify-content:center; position:relative; }

#stage { width:100vw; height:100vh; height:100dvh; display:flex; align-items:center; justify-content:center; position:relative; cursor:default; }
#canvas-wrap { position:relative; max-width:100vw; max-height:100vh; display:flex; align-items:center; justify-content:center; }
canvas { display:block; max-width:100vw; max-height:100vh; box-shadow:0 0 0 1px var(--bg), 0 20px 80px rgba(0,0,0,0.5); background:var(--bg); }
canvas.pre-render { visibility:hidden; }
canvas.back { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); visibility:hidden; pointer-events:none; }
#mobile-page { display:none; align-items:center; justify-content:center; overflow:hidden; max-width:100vw; max-height:100vh; box-shadow:0 20px 80px rgba(0,0,0,0.5); background:var(--bg); position:relative; }
body.mobile-canvas > #stage canvas { display:none; }
body.mobile-canvas #mobile-page { display:flex; }
body.mobile-canvas #mobile-page canvas { display:block; }

/* Annotation layer: transparent overlay for clickable links */
#anno-layer { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); overflow:hidden; pointer-events:none; z-index:20; }
#anno-layer a { position:absolute; pointer-events:auto; cursor:pointer; }

/* Loader */
#loader { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; background:var(--bg); z-index:50; transition:opacity .4s; font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--dim); letter-spacing:.08em; }
#loader.hide { opacity:0; pointer-events:none; }
#loader-label { display:flex; align-items:center; margin-bottom:14px; }
#loader-label::after { content:''; width:6px; height:6px; background:var(--dim); border-radius:50%; margin-left:10px; animation:pulse 1s infinite; }
#loader-label a { color:rgba(var(--lavender),0.9); text-decoration:none; border-bottom:1px solid rgba(var(--lavender),0.35); }
#loader-label a:hover { border-bottom-color:rgba(var(--lavender),0.9); }
#progress-track { width:180px; height:1px; background:rgba(255,255,255,0.08); position:relative; overflow:hidden; }
#progress-bar { position:absolute; top:0; left:0; height:100%; width:0%; background:rgba(238,217,255,0.7); transition:width .3s ease-out; }
#progress-pct { margin-top:10px; font-size:10px; color:rgba(238,217,255,0.5); font-variant-numeric:tabular-nums; }
@keyframes pulse { 0%,100%{opacity:.3} 50%{opacity:1} }

/* Click zones for nav (invisible) */
.nav-zone { position:absolute; top:0; height:100%; width:25%; z-index:18; cursor:pointer; touch-action:manipulation; }
.nav-zone.prev { left:0; }
.nav-zone.next { right:0; cursor:e-resize; }
.nav-zone.prev { cursor:w-resize; }

/* Chrome: appears on hover/motion */
#chrome { position:fixed; bottom:0; left:0; right:0; padding:20px 24px calc(20px + env(safe-area-inset-bottom)); display:flex; justify-content:space-between; align-items:center; background:linear-gradient(to top, rgba(0,0,0,0.6), transparent); z-index:20; opacity:0; transition:opacity .3s; pointer-events:none; font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:.08em; }
body.show-chrome #chrome { opacity:1; pointer-events:auto; }
#counter { color:var(--fg); }
#counter .dim { color:var(--dim); }
#meta { color:var(--dim); text-transform:uppercase; }
#meta a { color:var(--dim); text-decoration:none; border-bottom:1px solid transparent; transition:border-color .2s; }
#meta a:hover { border-bottom-color:var(--dim); }

#hint { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); font-family:'IBM Plex Mono',monospace; font-size:11px; color:rgba(var(--lavender),0.85); letter-spacing:.1em; pointer-events:none; opacity:0; transition:opacity .5s; z-index:30; text-align:center; background:rgba(10,10,10,0.78); padding:14px 20px; border:1px solid rgba(var(--lavender),0.22); backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px); box-shadow:0 8px 32px rgba(0,0,0,0.3); }
#hint.show { opacity:1; }
#hint kbd { background:rgba(var(--lavender),0.12); color:rgba(var(--lavender),0.95); padding:2px 6px; border-radius:3px; margin:0 2px; font-family:inherit; border:1px solid rgba(var(--lavender),0.2); }

@media (max-width: 768px) {
  #chrome { padding:14px 16px calc(14px + env(safe-area-inset-bottom)); font-size:10px; }
  #hint { display:none; }
}

<body>

<div id="stage">
  <div id="canvas-wrap"><canvas id="canvas" class="pre-render"></canvas><canvas id="canvas-back" class="back"></canvas><div id="anno-layer"></div><div id="mobile-page"></div></div>
  <div class="nav-zone prev" id="prevZone" aria-hidden="true"></div>
  <div class="nav-zone next" id="nextZone" aria-hidden="true"></div>
</div>

<div id="loader">
  <div id="loader-label">LOADING</div>
  <div id="progress-track"><div id="progress-bar"></div></div>
  <div id="progress-pct">0%</div>
</div>

<div id="hint">
  <kbd>←</kbd> <kbd>→</kbd> navigate &nbsp;·&nbsp; <kbd>F</kbd> fullscreen &nbsp;·&nbsp; <kbd>ESC</kbd> exit
</div>

<div id="chrome">
  <div id="counter"><span id="cur">1</span><span class="dim"> / </span><span id="total">–</span></div>
  <div id="meta">MIAN DENG &nbsp;·&nbsp; <a href="https://0xmian.com" target="_blank" rel="noopener">0XMIAN.COM</a></div>
</div>

<script>
const PDF_URL = 'Mian_xAI_Pitch.pdf';
const isMobileCanvasMode = window.matchMedia('(max-width: 768px), (pointer: coarse)').matches;
if (isMobileCanvasMode) document.body.classList.add('mobile-canvas');
const PDFJS_SOURCES = [
  {
    script: 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js',
    worker: 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js'
  },
  {
    script: 'https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.min.js',
    worker: 'https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.worker.min.js'
  },
  {
    script: 'https://unpkg.com/pdfjs-dist@3.11.174/build/pdf.min.js',
    worker: 'https://unpkg.com/pdfjs-dist@3.11.174/build/pdf.worker.min.js'
  }
];
const loader = document.getElementById('loader');
const loaderLabel = document.getElementById('loader-label');
const progressBar = document.getElementById('progress-bar');
const progressPct = document.getElementById('progress-pct');
const curEl = document.getElementById('cur');
const totalEl = document.getElementById('total');
const hintEl = document.getElementById('hint');
const annoLayer = document.getElementById('anno-layer');
const mobilePage = document.getElementById('mobile-page');

let pdfDoc = null, currentPage = 1, totalPages = 0, rendering = false, pendingPage = null;
let mobileCanvas = null; // single persistent canvas — never replaced so browser zoom state is preserved

// Parse ?page= from URL for deep linking
const urlParams = new URLSearchParams(window.location.search);
const startPage = Math.max(1, parseInt(urlParams.get('page')) || 1);

function setProgress(pct) {
  pct = Math.max(0, Math.min(100, Math.round(pct)));
  progressBar.style.width = pct + '%';
  progressPct.textContent = pct + '%';
}

let frontCanvas = document.getElementById('canvas');
let backCanvas = document.getElementById('canvas-back');

function getRenderRatio() {
  return Math.min(window.devicePixelRatio || 1, 2);
}

function showLoadError(message) {
  loader.classList.remove('hide');
  loaderLabel.textContent = 'FAILED TO LOAD · ' + message + ' · ';
  const link = document.createElement('a');
  link.href = PDF_URL;
  link.target = '_blank';
  link.rel = 'noopener';
  link.textContent = 'OPEN PDF';
  loaderLabel.appendChild(link);
  progressPct.textContent = '';
}

function loadScript(src) {
  return new Promise((resolve, reject) => {
    const script = document.createElement('script');
    script.src = src;
    script.async = true;
    script.onload = resolve;
    script.onerror = () => reject(new Error('Unable to load ' + src));
    document.head.appendChild(script);
  });
}

async function loadPdfDocument() {
  let lastError;
  for (const source of PDFJS_SOURCES) {
    try {
      await loadScript(source.script);
      if (!window.pdfjsLib) throw new Error('PDF.js was not initialized');
      pdfjsLib.GlobalWorkerOptions.workerSrc = source.worker;
      const loadingTask = pdfjsLib.getDocument({
        url: PDF_URL,
        fontExtraProperties: true,
        disableAutoFetch: true,
        disableStream: false,
        rangeChunkSize: 65536
      });
      loadingTask.onProgress = ({ loaded, total }) => {
        if (total) setProgress((loaded / total) * 100);
        else setProgress(Math.min(90, (loaded / (6.7 * 1024 * 1024)) * 100));
      };
      return await loadingTask.promise;
    } catch (err) {
      lastError = err;
      delete window.pdfjsLib;
    }
  }
  throw lastError || new Error('PDF.js could not be loaded');
}

function getPageLayout(page) {
  const vw = window.innerWidth, vh = window.innerHeight;
  const unscaled = page.getViewport({ scale: 1 });
  const scale = Math.min(vw / unscaled.width, vh / unscaled.height) * 0.96;
  const cssW = Math.round(unscaled.width * scale);
  const cssH = Math.round(unscaled.height * scale);
  return { unscaled, scale, cssW, cssH };
}

async function renderCanvasPage(page) {
  const { unscaled, scale, cssW, cssH } = getPageLayout(page);
  const renderRatio = getRenderRatio();
  // Derive physical pixels from CSS pixels to guarantee exact alignment (no sub-pixel gap)
  const pixelW = Math.round(cssW * renderRatio);
  const pixelH = Math.round(cssH * renderRatio);
  const viewport = page.getViewport({ scale: pixelW / unscaled.width });
  const canvasScaleX = pixelW / cssW;
  const canvasScaleY = pixelH / cssH;
  // Render to the OFF-screen back canvas
  backCanvas.width = pixelW;
  backCanvas.height = pixelH;
  backCanvas.style.width = cssW + 'px';
  backCanvas.style.height = cssH + 'px';
  const backCtx = backCanvas.getContext('2d');
  await page.render({ canvasContext: backCtx, viewport }).promise;
  // Swap: the back canvas becomes front, front becomes back
  frontCanvas.classList.add('back');
  backCanvas.classList.remove('back');
  backCanvas.classList.remove('pre-render');
  const tmp = frontCanvas;
  frontCanvas = backCanvas;
  backCanvas = tmp;
  // Rebuild annotation layer (clickable links)
  annoLayer.innerHTML = '';
  annoLayer.style.width = cssW + 'px';
  annoLayer.style.height = cssH + 'px';
  const annotations = await page.getAnnotations();
  for (const anno of annotations) {
    if (anno.subtype !== 'Link' || !anno.url) continue;
    const [x1, y1, x2, y2] = pdfjsLib.Util.normalizeRect(
      viewport.convertToViewportRectangle(anno.rect)
    );
    const a = document.createElement('a');
    a.href = anno.url;
    a.target = '_blank';
    a.rel = 'noopener noreferrer';
    a.style.left   = (x1 / canvasScaleX) + 'px';
    a.style.top    = (y1 / canvasScaleY) + 'px';
    a.style.width  = ((x2 - x1) / canvasScaleX) + 'px';
    a.style.height = ((y2 - y1) / canvasScaleY) + 'px';
    annoLayer.appendChild(a);
  }
}

async function renderMobileCanvasPage(page) {
  const { unscaled, cssW, cssH } = getPageLayout(page);
  const dpr = window.devicePixelRatio || 1;
  // Render at 3×DPR so the user can zoom to ~3× before any blur.
  // We never re-render during zoom (snapback prevention), so this
  // pre-render budget must cover typical reading zoom levels.
  const renderRatio = Math.min(dpr * 3, 8);
  const maxPixels = 16_000_000;
  const limitedRatio = Math.min(renderRatio, Math.sqrt(maxPixels / (cssW * cssH)));
  const pixelW = Math.max(1, Math.round(cssW * limitedRatio));
  const pixelH = Math.max(1, Math.round(cssH * limitedRatio));
  const viewport = page.getViewport({ scale: pixelW / unscaled.width });

  // Keep the same canvas element in the DOM permanently.
  // Any DOM node replacement (replaceChildren) causes iOS/Android to reset
  // the visual-viewport scale to 1 — the snap-back bug.
  if (!mobileCanvas) {
    mobileCanvas = document.createElement('canvas');
    mobileCanvas.style.display = 'block';
    mobilePage.appendChild(mobileCanvas);
  }

  mobileCanvas.width  = pixelW;
  mobileCanvas.height = pixelH;
  mobileCanvas.style.width  = cssW + 'px';
  mobileCanvas.style.height = cssH + 'px';
  mobilePage.style.width  = cssW + 'px';
  mobilePage.style.height = cssH + 'px';

  const ctx = mobileCanvas.getContext('2d', { alpha: false });
  if (!ctx) throw new Error('Canvas context unavailable');
  await page.render({ canvasContext: ctx, viewport }).promise;

  // Rebuild annotation layer (clickable links) — same logic as desktop
  const canvasScaleX = pixelW / cssW;
  const canvasScaleY = pixelH / cssH;
  annoLayer.innerHTML = '';
  annoLayer.style.width  = cssW + 'px';
  annoLayer.style.height = cssH + 'px';
  const annotations = await page.getAnnotations();
  for (const anno of annotations) {
    if (anno.subtype !== 'Link' || !anno.url) continue;
    const [x1, y1, x2, y2] = pdfjsLib.Util.normalizeRect(
      viewport.convertToViewportRectangle(anno.rect)
    );
    const a = document.createElement('a');
    a.href = anno.url;
    a.target = '_blank';
    a.rel = 'noopener noreferrer';
    a.style.left   = (x1 / canvasScaleX) + 'px';
    a.style.top    = (y1 / canvasScaleY) + 'px';
    a.style.width  = ((x2 - x1) / canvasScaleX) + 'px';
    a.style.height = ((y2 - y1) / canvasScaleY) + 'px';
    annoLayer.appendChild(a);
  }
}

async function render(num) {
  if (rendering) { pendingPage = num; return; }
  rendering = true;
  try {
    const page = await pdfDoc.getPage(num);
    if (isMobileCanvasMode) {
      await renderMobileCanvasPage(page);
    } else {
      await renderCanvasPage(page);
    }
    curEl.textContent = num;
    const url = new URL(window.location);
    if (num === 1) url.searchParams.delete('page'); else url.searchParams.set('page', num);
    window.history.replaceState({}, '', url);
    return true;
  } catch (err) {
    showLoadError(err.message || 'Unable to render this slide');
    return false;
  } finally {
    rendering = false;
    if (pendingPage !== null) { const p = pendingPage; pendingPage = null; render(p); }
  }
}

// Mobile page-flip animation
let flipEl = null;  // overlay canvas that "peels away"
let isFlipping = false;

function getFlipEl() {
  if (!flipEl) {
    flipEl = document.createElement('canvas');
    // Mount on canvas-wrap (not mobile-page) so overflow:hidden on mobile-page
    // doesn't clip the 3D rotation. canvas-wrap is position:relative.
    flipEl.style.cssText = 'position:absolute;display:none;z-index:10;pointer-events:none;box-shadow:none;background:#000;';
    document.getElementById('canvas-wrap').appendChild(flipEl);
  }
  return flipEl;
}

async function animateFlip(n, direction) {
  const fe = getFlipEl();

  // Snapshot current page onto flipEl
  const snapW = mobileCanvas.width, snapH = mobileCanvas.height;
  const snapCssW = mobileCanvas.style.width, snapCssH = mobileCanvas.style.height;
  fe.width = snapW;
  fe.height = snapH;
  fe.style.width  = snapCssW;
  fe.style.height = snapCssH;
  const fCtx = fe.getContext('2d');
  if (!fCtx) throw new Error('flipEl context unavailable');
  fCtx.drawImage(mobileCanvas, 0, 0);

  // Curl-shadow gradient on the turning (leading) edge
  const shadowW = Math.round(snapW * 0.18);
  const grad = direction === 'forward'
    ? fCtx.createLinearGradient(snapW - shadowW, 0, snapW, 0)   // right edge darkens
    : fCtx.createLinearGradient(shadowW, 0, 0, 0);               // left edge darkens
  grad.addColorStop(0, 'rgba(0,0,0,0)');
  grad.addColorStop(1, 'rgba(0,0,0,0.38)');
  fCtx.fillStyle = grad;
  fCtx.fillRect(direction === 'forward' ? snapW - shadowW : 0, 0, shadowW, snapH);

  // Position flipEl exactly over mobilePage in canvas-wrap coordinates
  const mpRect = mobilePage.getBoundingClientRect();
  const cwRect = document.getElementById('canvas-wrap').getBoundingClientRect();
  fe.style.left = (mpRect.left - cwRect.left) + 'px';
  fe.style.top  = (mpRect.top  - cwRect.top)  + 'px';

  // Pivot on leading edge; target angle
  const endAngle = direction === 'forward' ? -90 : 90;
  fe.style.transformOrigin = direction === 'forward' ? 'right center' : 'left center';
  fe.style.display = 'block';

  // Render new page into mobileCanvas while flipEl covers it
  await render(n);

  // Animate 0° → endAngle with ease-in-out cubic
  const DURATION = 420;
  const t0 = performance.now();
  await new Promise(resolve => {
    function step(now) {
      const raw = Math.min((now - t0) / DURATION, 1);
      const ease = raw < 0.5 ? 4*raw*raw*raw : 1 - Math.pow(-2*raw+2, 3)/2;
      fe.style.transform = `perspective(1400px) rotateY(${ease * endAngle}deg)`;
      if (raw < 1) { requestAnimationFrame(step); }
      else {
        fe.style.display = 'none';
        fe.style.transform = '';
        resolve();
      }
    }
    requestAnimationFrame(step);
  });
}

function go(n) {
  n = Math.max(1, Math.min(totalPages, n));
  if (n === currentPage || isFlipping) return;
  const direction = n > currentPage ? 'forward' : 'backward';
  currentPage = n;
  if (isMobileCanvasMode && mobileCanvas) {
    isFlipping = true;
    animateFlip(n, direction)
      .catch(() => render(n))   // if animation fails, fall back to direct render
      .finally(() => { isFlipping = false; });
  } else {
    render(n);
  }
}

function resetMobileZoom() {
  // Reset native zoom before navigating so the next page renders at scale 1.
  // Only do this while zoomed; changing the meta viewport tag while at scale 1
  // is a no-op but avoids any unnecessary DOM thrash.
  if ((window.visualViewport?.scale || 1) <= 1.05) return;
  const meta = document.querySelector('meta[name="viewport"]');
  if (!meta) return;
  const original = meta.content;
  meta.content = original + ', maximum-scale=1';
  requestAnimationFrame(() => { meta.content = original; });
}

// Nav
let lastZoneNavAt = 0;
function bindNavZone(id, delta) {
  const zone = document.getElementById(id);
  let startX = 0, startY = 0;
  const navigate = e => {
    e.preventDefault();
    if (Math.abs(e.clientX - startX) > 18 || Math.abs(e.clientY - startY) > 18) return;
    const now = Date.now();
    if (now - lastZoneNavAt < 350) return;
    lastZoneNavAt = now;
    resetMobileZoom();
    go(currentPage + delta);
  };
  zone.addEventListener('pointerdown', e => { startX = e.clientX; startY = e.clientY; });
  zone.addEventListener('pointerup', navigate);
  zone.addEventListener('click', navigate);
}
bindNavZone('prevZone', -1);
bindNavZone('nextZone', 1);

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown' || e.key === ' ' || e.key === 'PageDown') { e.preventDefault(); go(currentPage + 1); }
  else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp' || e.key === 'PageUp') { e.preventDefault(); go(currentPage - 1); }
  else if (e.key === 'Home') { e.preventDefault(); go(1); }
  else if (e.key === 'End') { e.preventDefault(); go(totalPages); }
  else if (e.key === 'f' || e.key === 'F') { toggleFullscreen(); }
});

function toggleFullscreen() {
  if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(()=>{});
  else document.exitFullscreen();
}

// Touch swipe
let touchStartX = 0, touchStartY = 0;
document.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; touchStartY = e.touches[0].clientY; }, {passive:true});
document.addEventListener('touchend', e => {
  if ((window.visualViewport?.scale || 1) > 1.05) return; // panning while zoomed — don't navigate
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (Math.abs(dx) > 50 && Math.abs(dx) > Math.abs(dy)) { resetMobileZoom(); dx < 0 ? go(currentPage + 1) : go(currentPage - 1); }
}, {passive:true});

// Chrome show/hide on motion
let chromeTimer;
function showChrome() {
  document.body.classList.add('show-chrome');
  clearTimeout(chromeTimer);
  chromeTimer = setTimeout(() => document.body.classList.remove('show-chrome'), 2500);
}
document.addEventListener('mousemove', showChrome);
document.addEventListener('touchstart', showChrome, {passive:true});

// Resize
let resizeTimer;
function scheduleRender(delay = 150) {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => {
    if (!pdfDoc) return;
    // Never re-render while the user is zoomed in on mobile.
    // canvas.width/height mutations during zoom cause iOS/Android to snap the
    // visual viewport back to scale 1. The initial render at 3×DPR is enough
    // for sharp display up to ~3× zoom on high-DPR devices.
    if (isMobileCanvasMode && (window.visualViewport?.scale || 1) > 1.05) return;
    if (isFlipping) return;
    render(currentPage);
  }, delay);
}
window.addEventListener('resize', () => scheduleRender());
// No visualViewport resize listener: window resize handles orientation changes,
// and we must never re-render during pinch zoom.

// Init
(async () => {
  try {
    pdfDoc = await loadPdfDocument();
    totalPages = pdfDoc.numPages;
    totalEl.textContent = totalPages;
    currentPage = Math.min(startPage, totalPages);
    setProgress(100);
    const rendered = await render(currentPage);
    if (!rendered) return;
    loader.classList.add('hide');
    showChrome();
    // Show keyboard hint briefly on desktop when landing on page 1
    if (window.innerWidth > 768 && currentPage === 1) {
      setTimeout(() => { hintEl.classList.add('show'); setTimeout(() => hintEl.classList.remove('show'), 3500); }, 800);
    }
  } catch (err) {
    showLoadError(err.message);
  }
})();
