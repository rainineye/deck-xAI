<script>
const PDF_URL = 'Mian_xAI_Pitch.pdf';
const isMobileCanvasMode = window.matchMedia('(max-width: 768px), (pointer: coarse)').matches;
if (isMobileCanvasMode) document.body.classList.add('mobile-canvas');
const PDFJS_SOURCES = [
  {
    script: 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js',
    worker: 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js'
  },
  {
    script: 'https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.min.js',
    worker: 'https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.worker.min.js'
  },
  {
    script: 'https://unpkg.com/pdfjs-dist@3.11.174/build/pdf.min.js',
    worker: 'https://unpkg.com/pdfjs-dist@3.11.174/build/pdf.worker.min.js'
  }
];
const loader = document.getElementById('loader');
const loaderLabel = document.getElementById('loader-label');
const progressBar = document.getElementById('progress-bar');
const progressPct = document.getElementById('progress-pct');
const curEl = document.getElementById('cur');
const totalEl = document.getElementById('total');
const hintEl = document.getElementById('hint');
const annoLayer = document.getElementById('anno-layer');
const mobilePage = document.getElementById('mobile-page');

let pdfDoc = null, currentPage = 1, totalPages = 0, rendering = false, pendingPage = null;
let mobileCanvas = null; // single persistent canvas — never replaced so browser zoom state is preserved

// Parse ?page= from URL for deep linking
const urlParams = new URLSearchParams(window.location.search);
const startPage = Math.max(1, parseInt(urlParams.get('page')) || 1);

function setProgress(pct) {
  pct = Math.max(0, Math.min(100, Math.round(pct)));
  progressBar.style.width = pct + '%';
  progressPct.textContent = pct + '%';
}

let frontCanvas = document.getElementById('canvas');
let backCanvas = document.getElementById('canvas-back');

function getRenderRatio() {
  return Math.min(window.devicePixelRatio || 1, 2);
}

function showLoadError(message) {
  loader.classList.remove('hide');
  loaderLabel.textContent = 'FAILED TO LOAD · ' + message + ' · ';
  const link = document.createElement('a');
  link.href = PDF_URL;
  link.target = '_blank';
  link.rel = 'noopener';
  link.textContent = 'OPEN PDF';
  loaderLabel.appendChild(link);
  progressPct.textContent = '';
}

function loadScript(src) {
  return new Promise((resolve, reject) => {
    const script = document.createElement('script');
    script.src = src;
    script.async = true;
    script.onload = resolve;
    script.onerror = () => reject(new Error('Unable to load ' + src));
    document.head.appendChild(script);
  });
}

async function loadPdfDocument() {
  let lastError;
  for (const source of PDFJS_SOURCES) {
    try {
      await loadScript(source.script);
      if (!window.pdfjsLib) throw new Error('PDF.js was not initialized');
      pdfjsLib.GlobalWorkerOptions.workerSrc = source.worker;
      const loadingTask = pdfjsLib.getDocument({
        url: PDF_URL,
        fontExtraProperties: true,
        disableAutoFetch: true,
        disableStream: false,
        rangeChunkSize: 65536
      });
      loadingTask.onProgress = ({ loaded, total }) => {
        if (total) setProgress((loaded / total) * 100);
        else setProgress(Math.min(90, (loaded / (6.7 * 1024 * 1024)) * 100));
      };
      return await loadingTask.promise;
    } catch (err) {
      lastError = err;
      delete window.pdfjsLib;
    }
  }
  throw lastError || new Error('PDF.js could not be loaded');
}

function getPageLayout(page) {
  const vw = window.innerWidth, vh = window.innerHeight;
  const unscaled = page.getViewport({ scale: 1 });
  const scale = Math.min(vw / unscaled.width, vh / unscaled.height) * 0.96;
  const cssW = Math.round(unscaled.width * scale);
  const cssH = Math.round(unscaled.height * scale);
  return { unscaled, scale, cssW, cssH };
}

async function renderCanvasPage(page) {
  const { unscaled, scale, cssW, cssH } = getPageLayout(page);
  const renderRatio = getRenderRatio();
  // Derive physical pixels from CSS pixels to guarantee exact alignment (no sub-pixel gap)
  const pixelW = Math.round(cssW * renderRatio);
  const pixelH = Math.round(cssH * renderRatio);
  // Use max-fit scale so viewport always covers full canvas (prevents white border from rounding)
  const viewport = page.getViewport({ scale: Math.max(pixelW / unscaled.width, pixelH / unscaled.height) });
  const canvasScaleX = pixelW / cssW;
  const canvasScaleY = pixelH / cssH;
  // Render to the OFF-screen back canvas
  backCanvas.width = pixelW;
  backCanvas.height = pixelH;
  backCanvas.style.width = cssW + 'px';
  backCanvas.style.height = cssH + 'px';
  const backCtx = backCanvas.getContext('2d');
  await page.render({ canvasContext: backCtx, viewport }).promise;
  // Swap: the back canvas becomes front, front becomes back
  frontCanvas.classList.add('back');
  backCanvas.classList.remove('back');
  backCanvas.classList.remove('pre-render');
  const tmp = frontCanvas;
  frontCanvas = backCanvas;
  backCanvas = tmp;
  // Rebuild annotation layer (clickable links)
  annoLayer.innerHTML = '';
  annoLayer.style.width = cssW + 'px';
  annoLayer.style.height = cssH + 'px';
  const annotations = await page.getAnnotations();
  for (const anno of annotations) {
    if (anno.subtype !== 'Link' || !anno.url) continue;
    const [x1, y1, x2, y2] = pdfjsLib.Util.normalizeRect(
      viewport.convertToViewportRectangle(anno.rect)
    );
    const a = document.createElement('a');
    a.href = anno.url;
    a.target = '_blank';
    a.rel = 'noopener noreferrer';
    a.style.left   = (x1 / canvasScaleX) + 'px';
    a.style.top    = (y1 / canvasScaleY) + 'px';
    a.style.width  = ((x2 - x1) / canvasScaleX) + 'px';
    a.style.height = ((y2 - y1) / canvasScaleY) + 'px';
    annoLayer.appendChild(a);
  }
}

async function renderMobileCanvasPage(page) {
  const { unscaled, cssW, cssH } = getPageLayout(page);
  const dpr = window.devicePixelRatio || 1;
  // Render at 3×DPR so the user can zoom to ~3× before any blur.
  // We never re-render during zoom (snapback prevention), so this
  // pre-render budget must cover typical reading zoom levels.
  const renderRatio = Math.min(dpr * 3, 8);
  const maxPixels = 16_000_000;
  const limitedRatio = Math.min(renderRatio, Math.sqrt(maxPixels / (cssW * cssH)));
  const pixelW = Math.max(1, Math.round(cssW * limitedRatio));
  const pixelH = Math.max(1, Math.round(cssH * limitedRatio));
  // Use max-fit scale so viewport always covers full canvas (prevents white border from rounding)
  const viewport = page.getViewport({ scale: Math.max(pixelW / unscaled.width, pixelH / unscaled.height) });

  // Keep the same canvas element in the DOM permanently.
  // Any DOM node replacement (replaceChildren) causes iOS/Android to reset
  // the visual-viewport scale to 1 — the snap-back bug.
  if (!mobileCanvas) {
    mobileCanvas = document.createElement('canvas');
    mobileCanvas.style.display = 'block';
    mobilePage.appendChild(mobileCanvas);
  }

  // Only mutate canvas dimensions when they actually change.
  // On mobile (iOS Safari) assigning canvas.width/height — even to the same value —
  // triggers an immediate GPU texture clear that composites through any overlaid
  // canvas (curlCanvas), causing a visible flash at animation start.
  if (mobileCanvas.width !== pixelW || mobileCanvas.height !== pixelH) {
    mobileCanvas.width  = pixelW;
    mobileCanvas.height = pixelH;
  }
  if (mobileCanvas.style.width  !== cssW + 'px') mobileCanvas.style.width  = cssW + 'px';
  if (mobileCanvas.style.height !== cssH + 'px') mobileCanvas.style.height = cssH + 'px';
  if (mobilePage.style.width    !== cssW + 'px') mobilePage.style.width    = cssW + 'px';
  if (mobilePage.style.height   !== cssH + 'px') mobilePage.style.height   = cssH + 'px';

  const ctx = mobileCanvas.getContext('2d', { alpha: false });
  if (!ctx) throw new Error('Canvas context unavailable');
  await page.render({ canvasContext: ctx, viewport }).promise;

  // Rebuild annotation layer (clickable links) — same logic as desktop
  const canvasScaleX = pixelW / cssW;
  const canvasScaleY = pixelH / cssH;
  annoLayer.innerHTML = '';
  annoLayer.style.width  = cssW + 'px';
  annoLayer.style.height = cssH + 'px';
  const annotations = await page.getAnnotations();
  for (const anno of annotations) {
    if (anno.subtype !== 'Link' || !anno.url) continue;
    const [x1, y1, x2, y2] = pdfjsLib.Util.normalizeRect(
      viewport.convertToViewportRectangle(anno.rect)
    );
    const a = document.createElement('a');
    a.href = anno.url;
    a.target = '_blank';
    a.rel = 'noopener noreferrer';
    a.style.left   = (x1 / canvasScaleX) + 'px';
    a.style.top    = (y1 / canvasScaleY) + 'px';
    a.style.width  = ((x2 - x1) / canvasScaleX) + 'px';
    a.style.height = ((y2 - y1) / canvasScaleY) + 'px';
    annoLayer.appendChild(a);
  }
}

async function render(num) {
  if (rendering) { pendingPage = num; return; }
  rendering = true;
  try {
    const page = await pdfDoc.getPage(num);
    if (isMobileCanvasMode) {
      await renderMobileCanvasPage(page);
    } else {
      await renderCanvasPage(page);
    }
    curEl.textContent = num;
    const url = new URL(window.location);
    if (num === 1) url.searchParams.delete('page'); else url.searchParams.set('page', num);
    window.history.replaceState({}, '', url);
    return true;
  } catch (err) {
    showLoadError(err.message || 'Unable to render this slide');
    return false;
  } finally {
    rendering = false;
    if (pendingPage !== null) { const p = pendingPage; pendingPage = null; render(p); }
  }
}

// ── Mobile canvas page-curl animation ──
// Draws a diagonal fold sweep (corner peel) using requestAnimationFrame.
// backward = right swipe → peel from top-right corner, sweep left
// forward  = left  swipe → peel from top-left  corner, sweep right
let curlCanvas = null, curlCtx = null;
let snapCanvas = null;     // offscreen snapshot of departing page
let destSnapCanvas = null; // offscreen snapshot of destination page
let flipGen = 0;

// ── Adjacent-page pre-render cache ──
const pageCache = new Map(); // pageNum → { canvas, cssW, cssH, pixelW, pixelH }
const preRenderInProgress = new Set();

async function preRenderPage(num) {
  if (!pdfDoc || num < 1 || num > totalPages) return;
  if (pageCache.has(num) || preRenderInProgress.has(num)) return;
  preRenderInProgress.add(num);
  try {
    const page = await pdfDoc.getPage(num);
    const { unscaled, cssW, cssH } = getPageLayout(page);
    const dpr = window.devicePixelRatio || 1;
    const renderRatio = Math.min(dpr * 3, 8);
    const maxPixels = 16_000_000;
    const limitedRatio = Math.min(renderRatio, Math.sqrt(maxPixels / (cssW * cssH)));
    const pixelW = Math.max(1, Math.round(cssW * limitedRatio));
    const pixelH = Math.max(1, Math.round(cssH * limitedRatio));
    const viewport = page.getViewport({ scale: Math.max(pixelW / unscaled.width, pixelH / unscaled.height) });
    const offscreen = document.createElement('canvas');
    offscreen.width = pixelW; offscreen.height = pixelH;
    const ctx = offscreen.getContext('2d', { alpha: false });
    await page.render({ canvasContext: ctx, viewport }).promise;
    pageCache.set(num, { canvas: offscreen, cssW, cssH, pixelW, pixelH });
  } catch (_) {
  } finally {
    preRenderInProgress.delete(num);
  }
}

function preRenderNeighbors(n) {
  setTimeout(() => preRenderPage(n - 1), 80);
  setTimeout(() => preRenderPage(n + 1), 200);
}

function invalidatePageCache() {
  pageCache.clear();
  preRenderInProgress.clear();
}

async function rebuildAnnotationsForPage(num) {
  const page = await pdfDoc.getPage(num);
  const { unscaled, cssW, cssH } = getPageLayout(page);
  const dpr = window.devicePixelRatio || 1;
  const renderRatio = Math.min(dpr * 3, 8);
  const maxPixels = 16_000_000;
  const limitedRatio = Math.min(renderRatio, Math.sqrt(maxPixels / (cssW * cssH)));
  const pixelW = Math.max(1, Math.round(cssW * limitedRatio));
  const pixelH = Math.max(1, Math.round(cssH * limitedRatio));
  const viewport = page.getViewport({ scale: Math.max(pixelW / unscaled.width, pixelH / unscaled.height) });
  const canvasScaleX = pixelW / cssW;
  const canvasScaleY = pixelH / cssH;
  annoLayer.innerHTML = '';
  annoLayer.style.width = cssW + 'px';
  annoLayer.style.height = cssH + 'px';
  const annotations = await page.getAnnotations();
  for (const anno of annotations) {
    if (anno.subtype !== 'Link' || !anno.url) continue;
    const [x1, y1, x2, y2] = pdfjsLib.Util.normalizeRect(viewport.convertToViewportRectangle(anno.rect));
    const a = document.createElement('a');
    a.href = anno.url; a.target = '_blank'; a.rel = 'noopener noreferrer';
    a.style.left   = (x1 / canvasScaleX) + 'px';
    a.style.top    = (y1 / canvasScaleY) + 'px';
    a.style.width  = ((x2 - x1) / canvasScaleX) + 'px';
    a.style.height = ((y2 - y1) / canvasScaleY) + 'px';
    annoLayer.appendChild(a);
  }
}

function ensureCurlCanvas() {
  if (curlCanvas) return;
  curlCanvas = document.createElement('canvas');
  curlCanvas.style.cssText = 'position:absolute;top:0;left:0;pointer-events:none;z-index:5;display:none;box-shadow:none;';
  mobilePage.appendChild(curlCanvas);
  curlCtx = curlCanvas.getContext('2d');
}

function drawCurlFrame(ctx, snap, dest, W, H, progress, direction) {
  ctx.clearRect(0, 0, W, H);
  // Draw destination page as background — visible in peeled area.
  // This avoids relying on canvas-layer compositing (black on mobile).
  if (dest) ctx.drawImage(dest, 0, 0, W, H);

  // ease-in-out
  const p = progress;
  const t = p < 0.5 ? 2 * p * p : 1 - Math.pow(-2 * p + 2, 2) / 2;

  // Strip tapers: wider at the leading corner, narrower at trailing edge
  const stripLead = Math.max(W * 0.10, 30); // width at leading corner (y=0 for bwd)
  const stripTrail = Math.max(W * 0.045, 14); // width at trailing edge (y=H for bwd)
  const lean    = H * 0.22;   // diagonal: bottom of fold lags top
  const shadowW = W * 0.06;   // shadow spread
  const bow     = W * 0.032;  // fold line bows outward (convex toward peeled side)

  // x of fold line at top (y=0) and bottom (y=H)
  let foldTop, foldBot;
  if (direction === 'backward') {
    foldTop = W - t * (W + stripLead);
    foldBot = foldTop + lean;
  } else {
    foldTop = -stripLead + t * (W + stripLead);
    foldBot = foldTop - lean;
  }

  // Bezier control point for fold curve — bows toward peeled side
  const bowDir   = direction === 'backward' ? 1 : -1;
  const cpFoldX  = (foldTop + foldBot) / 2 + bow * bowDir;
  const cpFoldY  = H * 0.5;
  // Control point for outer edge of curl strip (same bow, offset outward)
  const stripMid = (stripLead + stripTrail) / 2;
  const cpStripX = cpFoldX + stripMid * bowDir;
  const cpStripY = H * 0.5;

  if (direction === 'backward') {
    // ── 1. old page clipped to unpeeled (left) region ──
    ctx.save();
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(foldTop, 0);
    ctx.quadraticCurveTo(cpFoldX, cpFoldY, foldBot, H);
    ctx.lineTo(0, H);
    ctx.closePath();
    ctx.clip();
    ctx.drawImage(snap, 0, 0, W, H);
    ctx.restore();

    // ── 2. shadow on old page near fold ──
    ctx.save();
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(foldTop, 0);
    ctx.quadraticCurveTo(cpFoldX, cpFoldY, foldBot, H);
    ctx.lineTo(0, H);
    ctx.closePath();
    ctx.clip();
    const sg = ctx.createLinearGradient(foldTop - shadowW, H * 0.5, foldTop, H * 0.5);
    sg.addColorStop(0, 'rgba(0,0,0,0)');
    sg.addColorStop(1, 'rgba(50,28,80,0.18)');
    ctx.fillStyle = sg;
    ctx.fillRect(0, 0, W, H);
    ctx.restore();

    // ── 3. curl strip ──
    ctx.save();
    ctx.beginPath();
    ctx.moveTo(foldTop, 0);
    ctx.quadraticCurveTo(cpFoldX, cpFoldY, foldBot, H);
    ctx.lineTo(foldBot + stripTrail, H);
    ctx.quadraticCurveTo(cpStripX, cpStripY, foldTop + stripLead, 0);
    ctx.closePath();
    const cg = ctx.createLinearGradient(foldTop, H * 0.5, foldTop + stripLead, H * 0.5);
    cg.addColorStop(0,    'rgba(190,182,205,1)');
    cg.addColorStop(0.10, 'rgba(245,244,248,1)');
    cg.addColorStop(0.45, 'rgba(255,255,255,1)');
    cg.addColorStop(0.80, 'rgba(245,244,248,1)');
    cg.addColorStop(1,    'rgba(238,236,242,1)');
    ctx.fillStyle = cg;
    ctx.fill();
    ctx.restore();

  } else {
    // ── 1. old page clipped to unpeeled (right) region ──
    ctx.save();
    ctx.beginPath();
    ctx.moveTo(foldTop, 0);
    ctx.lineTo(W, 0);
    ctx.lineTo(W, H);
    ctx.lineTo(foldBot, H);
    ctx.quadraticCurveTo(cpFoldX, cpFoldY, foldTop, 0);
    ctx.closePath();
    ctx.clip();
    ctx.drawImage(snap, 0, 0, W, H);
    ctx.restore();

    // ── 2. shadow on old page near fold ──
    ctx.save();
    ctx.beginPath();
    ctx.moveTo(foldTop, 0);
    ctx.lineTo(W, 0);
    ctx.lineTo(W, H);
    ctx.lineTo(foldBot, H);
    ctx.quadraticCurveTo(cpFoldX, cpFoldY, foldTop, 0);
    ctx.closePath();
    ctx.clip();
    const sg = ctx.createLinearGradient(foldTop, H * 0.5, foldTop + shadowW, H * 0.5);
    sg.addColorStop(0, 'rgba(50,28,80,0.18)');
    sg.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = sg;
    ctx.fillRect(0, 0, W, H);
    ctx.restore();

    // ── 3. curl strip ──
    ctx.save();
    ctx.beginPath();
    ctx.moveTo(foldTop - stripLead, 0);
    ctx.quadraticCurveTo(cpStripX, cpStripY, foldBot - stripTrail, H);
    ctx.lineTo(foldBot, H);
    ctx.quadraticCurveTo(cpFoldX, cpFoldY, foldTop, 0);
    ctx.closePath();
    const cg = ctx.createLinearGradient(foldTop - stripLead, H * 0.5, foldTop, H * 0.5);
    cg.addColorStop(0,    'rgba(238,236,242,1)');
    cg.addColorStop(0.20, 'rgba(245,244,248,1)');
    cg.addColorStop(0.55, 'rgba(255,255,255,1)');
    cg.addColorStop(0.90, 'rgba(245,244,248,1)');
    cg.addColorStop(1,    'rgba(190,182,205,1)');
    ctx.fillStyle = cg;
    ctx.fill();
    ctx.restore();
  }
}

async function animateCurl(n, direction, myGen) {
  ensureCurlCanvas();

  const W = mobileCanvas.width, H = mobileCanvas.height;

  // Snapshot the departing page
  if (!snapCanvas) snapCanvas = document.createElement('canvas');
  snapCanvas.width = W; snapCanvas.height = H;
  snapCanvas.getContext('2d').drawImage(mobileCanvas, 0, 0);

  // Prepare destination snapshot canvas (drawn into curlCanvas as background each frame)
  if (!destSnapCanvas) destSnapCanvas = document.createElement('canvas');
  destSnapCanvas.width = W; destSnapCanvas.height = H;

  // Size curlCanvas to match mobileCanvas exactly
  curlCanvas.width  = W;
  curlCanvas.height = H;
  curlCanvas.style.width  = mobileCanvas.style.width;
  curlCanvas.style.height = mobileCanvas.style.height;
  curlCanvas.style.display = 'block';

  // Apply destination page — instant from cache, or fallback to async render
  const cached = pageCache.get(n);
  if (cached) {
    // Populate destination snapshot immediately (cache = sync)
    destSnapCanvas.getContext('2d').drawImage(cached.canvas, 0, 0, W, H);
    // Also write to mobileCanvas so it's correct after the animation ends
    if (mobileCanvas.width !== cached.pixelW || mobileCanvas.height !== cached.pixelH) {
      mobileCanvas.width  = cached.pixelW;
      mobileCanvas.height = cached.pixelH;
    }
    if (mobileCanvas.style.width  !== cached.cssW + 'px') mobileCanvas.style.width  = cached.cssW + 'px';
    if (mobileCanvas.style.height !== cached.cssH + 'px') mobileCanvas.style.height = cached.cssH + 'px';
    if (mobilePage.style.width    !== cached.cssW + 'px') mobilePage.style.width    = cached.cssW + 'px';
    if (mobilePage.style.height   !== cached.cssH + 'px') mobilePage.style.height   = cached.cssH + 'px';
    mobileCanvas.getContext('2d', { alpha: false }).drawImage(cached.canvas, 0, 0);
    curEl.textContent = n;
    const url = new URL(window.location);
    if (n === 1) url.searchParams.delete('page'); else url.searchParams.set('page', n);
    window.history.replaceState({}, '', url);
    rebuildAnnotationsForPage(n).catch(() => {});
  } else {
    // Draw frame 0 (full old page) while render runs underneath
    drawCurlFrame(curlCtx, snapCanvas, null, W, H, 0, direction);
    await render(n);
    if (flipGen !== myGen) { curlCanvas.style.display = 'none'; return; }
    // Snapshot the freshly-rendered destination from mobileCanvas
    destSnapCanvas.getContext('2d').drawImage(mobileCanvas, 0, 0);
  }

  // Draw first animation frame with destination background now ready
  drawCurlFrame(curlCtx, snapCanvas, destSnapCanvas, W, H, 0, direction);
  if (flipGen !== myGen) { curlCanvas.style.display = 'none'; return; }

  const DURATION = 650; // ms
  const t0 = performance.now();

  await new Promise(resolve => {
    function frame(now) {
      if (flipGen !== myGen) {
        curlCtx.clearRect(0, 0, W, H);
        curlCanvas.style.display = 'none';
        resolve();
        return;
      }
      const progress = Math.min((now - t0) / DURATION, 1);
      drawCurlFrame(curlCtx, snapCanvas, destSnapCanvas, W, H, progress, direction);
      if (progress < 1) {
        requestAnimationFrame(frame);
      } else {
        curlCtx.clearRect(0, 0, W, H);
        curlCanvas.style.display = 'none';
        resolve();
      }
    }
    requestAnimationFrame(frame);
  });
}

function go(n) {
  n = Math.max(1, Math.min(totalPages, n));
  if (n === currentPage) return;
  const direction = n > currentPage ? 'backward' : 'forward';
  currentPage = n;
  if (isMobileCanvasMode && mobileCanvas) {
    const myGen = ++flipGen; // cancels any in-progress animation
    animateCurl(n, direction, myGen)
      .then(() => { if (isMobileCanvasMode) preRenderNeighbors(n); })
      .catch(() => render(n));
  } else {
    render(n);
  }
}

function resetMobileZoom() {
  // Reset native zoom before navigating so the next page renders at scale 1.
  // Only do this while zoomed; changing the meta viewport tag while at scale 1
  // is a no-op but avoids any unnecessary DOM thrash.
  if ((window.visualViewport?.scale || 1) <= 1.05) return;
  const meta = document.querySelector('meta[name="viewport"]');
  if (!meta) return;
  const original = meta.content;
  meta.content = original + ', maximum-scale=1';
  requestAnimationFrame(() => { meta.content = original; });
}

// Nav
let lastZoneNavAt = 0;
function bindNavZone(id, delta) {
  const zone = document.getElementById(id);
  let startX = 0, startY = 0;
  const navigate = e => {
    e.preventDefault();
    if (Math.abs(e.clientX - startX) > 18 || Math.abs(e.clientY - startY) > 18) return;
    const now = Date.now();
    if (now - lastZoneNavAt < 350) return;
    lastZoneNavAt = now;
    resetMobileZoom();
    go(currentPage + delta);
  };
  zone.addEventListener('pointerdown', e => { startX = e.clientX; startY = e.clientY; });
  zone.addEventListener('pointerup', navigate);
  zone.addEventListener('click', navigate);
}
bindNavZone('prevZone', -1);
bindNavZone('nextZone', 1);

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown' || e.key === ' ' || e.key === 'PageDown') { e.preventDefault(); go(currentPage + 1); }
  else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp' || e.key === 'PageUp') { e.preventDefault(); go(currentPage - 1); }
  else if (e.key === 'Home') { e.preventDefault(); go(1); }
  else if (e.key === 'End') { e.preventDefault(); go(totalPages); }
  else if (e.key === 'f' || e.key === 'F') { toggleFullscreen(); }
});

function toggleFullscreen() {
  if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(()=>{});
  else document.exitFullscreen();
}

// Touch swipe
let touchStartX = 0, touchStartY = 0;
document.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; touchStartY = e.touches[0].clientY; }, {passive:true});
document.addEventListener('touchend', e => {
  if ((window.visualViewport?.scale || 1) > 1.05) return; // panning while zoomed — don't navigate
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (Math.abs(dx) > 50 && Math.abs(dx) > Math.abs(dy)) { resetMobileZoom(); dx < 0 ? go(currentPage + 1) : go(currentPage - 1); }
}, {passive:true});

// Chrome show/hide on motion
let chromeTimer;
function showChrome() {
  document.body.classList.add('show-chrome');
  clearTimeout(chromeTimer);
  chromeTimer = setTimeout(() => document.body.classList.remove('show-chrome'), 2500);
}
document.addEventListener('mousemove', showChrome);
document.addEventListener('touchstart', showChrome, {passive:true});

// Resize
let resizeTimer;
function scheduleRender(delay = 150) {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => {
    if (!pdfDoc) return;
    // Never re-render while the user is zoomed in on mobile.
    // canvas.width/height mutations during zoom cause iOS/Android to snap the
    // visual viewport back to scale 1. The initial render at 3×DPR is enough
    // for sharp display up to ~3× zoom on high-DPR devices.
    if (isMobileCanvasMode && (window.visualViewport?.scale || 1) > 1.05) return;
    invalidatePageCache();
    render(currentPage);
  }, delay);
}
window.addEventListener('resize', () => scheduleRender());
// No visualViewport resize listener: window resize handles orientation changes,
// and we must never re-render during pinch zoom.

// Init
(async () => {
  try {
    pdfDoc = await loadPdfDocument();
    totalPages = pdfDoc.numPages;
    totalEl.textContent = totalPages;
    currentPage = Math.min(startPage, totalPages);
    setProgress(100);
    const rendered = await render(currentPage);
    if (!rendered) return;
    loader.classList.add('hide');
    if (isMobileCanvasMode) preRenderNeighbors(currentPage);
    showChrome();
    // Show keyboard hint briefly on desktop when landing on page 1
    if (window.innerWidth > 768 && currentPage === 1) {
      setTimeout(() => { hintEl.classList.add('show'); setTimeout(() => hintEl.classList.remove('show'), 3500); }, 800);
    }
  } catch (err) {
    showLoadError(err.message);
  }
})();
</script>
